name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Create Mock google-services.json
        run: |
          mkdir -p app
          echo '{"project_info":{"project_number":"12345678","project_id":"mock-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:12345678:android:12345678","android_client_info":{"package_name":"com.hari.androidtvremote"}},"oauth_client":[],"api_key":[{"current_key":"mock_key"}],"services":{}}],"configuration_version":"1"}' > app/google-services.json

      - name: Compile and Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon
